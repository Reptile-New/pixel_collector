<!DOCTYPE html><html><head><meta charset="utf-8"><style>
body{background:#0b0d15;color:#f4f3ff;font-family:system-ui;padding:12px}
.forge-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(72px,1fr));gap:12px}
.forge-item{position:relative;display:flex;flex-direction:column;align-items:center;gap:6px;padding:8px 4px;background:rgba(0,0,0,.22);border:1px solid rgba(255,255,255,.1);border-radius:10px;color:#fff}
.forge-item canvas{width:56px;height:56px;image-rendering:pixelated;border-radius:4px}
.forge-item__label{font-size:.72em;opacity:.85}
.forge-item__tier{font-size:.6em;font-weight:800;text-transform:uppercase;letter-spacing:.05em}
</style></head><body><div id="forgeGrid" class="forge-grid"></div>
<script src="pixel_renderer.js"></script><script src="pixel_data.js"></script>
<script>
const LEGENDARY_TIERS={mythic:{label:'Mythique',forgeRate:.05,weight:1,color:'#ff5db1'},legendary:{label:'Légendaire',forgeRate:.08,weight:2,color:'#ffd54a'},epic:{label:'Épique',forgeRate:.12,weight:5,color:'#b388ff'},common:{label:'Commun',forgeRate:.20,weight:10,color:'#8fd3ff'}};
const LEGENDARY_RARITY={art_heart:'mythic',art_crown:'legendary',art_diamond:'legendary',art_rainbow:'legendary',art_alien:'legendary',art_robot:'legendary',art_star:'epic',art_rocket:'epic',art_ghost:'epic',art_shield:'epic',art_butterfly:'epic',art_cat:'epic',art_coin:'epic',art_gift:'epic',art_moon:'epic',art_sun:'epic'};
const artTier=id=>LEGENDARY_TIERS[LEGENDARY_RARITY[id]||'common'];
const grid=document.getElementById('forgeGrid');
PixelArts.forEach(art=>{const it=document.createElement('div');it.className='forge-item';const c=document.createElement('canvas');PixelRenderer.drawPixel(c,{type:'art',data:art.data,colors:art.colors},64);it.appendChild(c);const l=document.createElement('div');l.className='forge-item__label';l.textContent=art.name;it.appendChild(l);const t=artTier(art.id);const tt=document.createElement('div');tt.className='forge-item__tier';tt.textContent=t.label;tt.style.color=t.color;it.appendChild(tt);it.style.borderColor=t.color+'3a';grid.appendChild(it);});
</script></body></html>
